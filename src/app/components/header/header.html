<header class="flex items-center justify-between px-4 h-[60px] bg-white border-b border-gray-200 z-10">
  <!-- Left: grid icon + logo -->
  <div class="flex items-center gap-3">
    <!-- Grid / apps icon + dropdown -->
    <div id="app-switcher-container" class="relative">
      <button (click)="toggleAppSwitcher()"
        class="p-1.5 rounded hover:bg-gray-100 transition-colors"
        [class.text-blue-600]="appSwitcherOpen"
        [class.text-gray-500]="!appSwitcherOpen">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm6 0h4v4h-4V4zM4 10h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4zM4 16h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4z"/>
        </svg>
      </button>

      @if (appSwitcherOpen) {
        <div class="absolute left-0 top-full mt-2 w-56 bg-white border border-gray-200 rounded-lg shadow-lg z-50 py-1 overflow-hidden">
          <p class="px-3 py-2 text-[10px] font-semibold uppercase tracking-widest text-gray-400">Apps</p>
          <button (click)="navigateToDashboard()" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors text-left">
            <div class="w-7 h-7 bg-blue-600 rounded flex items-center justify-center shrink-0">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/>
              </svg>
            </div>
            <span class="font-medium">Provider Dashboard</span>
          </button>
          <button (click)="navigateToProviderSetup()" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors text-left">
            <div class="w-7 h-7 bg-violet-600 rounded flex items-center justify-center shrink-0">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
              </svg>
            </div>
            <span class="font-medium">Provider Setup</span>
          </button>
          <button (click)="navigateToCustomerDashboard()" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors text-left">
            <div class="w-7 h-7 bg-teal-600 rounded flex items-center justify-center shrink-0">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
              </svg>
            </div>
            <span class="font-medium">Customer Dashboard</span>
          </button>
        </div>
      }
    </div>

    <!-- NetFoundry "N" logo -->
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold text-sm" style="font-family: 'Russo One', sans-serif;">N</div>
      <div class="flex flex-col leading-tight">
        <span class="font-bold text-gray-900 text-sm" style="font-family: 'Russo One', sans-serif;">Customer Connect</span>
        <span class="text-[10px] text-gray-500">By NetFoundry</span>
      </div>
    </div>
  </div>

  <!-- Right: actions -->
  <div class="flex items-center gap-3">
    <!-- Add button -->
    <button class="w-8 h-8 bg-blue-600 rounded text-white flex items-center justify-center hover:bg-blue-700">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
    </button>

    <!-- Bell icon -->
    <button class="p-1.5 text-gray-500 hover:text-gray-700 rounded relative">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
    </button>

    <!-- User avatar + menu -->
    <div id="user-menu-container" class="relative">
      <button (click)="toggleUserMenu()"
        class="w-8 h-8 rounded-full overflow-hidden transition-shadow"
        [class.ring-2]="userMenuOpen"
        [class.ring-blue-400]="userMenuOpen"
        [class.ring-offset-1]="userMenuOpen">
        @if (personaService.activePersona() === 'ian') {
          <div class="w-full h-full bg-gradient-to-br from-teal-400 to-cyan-600 flex items-center justify-center text-white text-xs font-semibold">I</div>
        } @else {
          <div class="w-full h-full bg-gradient-to-br from-violet-400 to-purple-600 flex items-center justify-center text-white text-xs font-semibold">M</div>
        }
      </button>

      @if (userMenuOpen) {
        <div class="absolute right-0 top-full mt-2 w-56 bg-white border border-gray-200 rounded-lg shadow-lg z-50 py-1 overflow-hidden">
          <p class="px-3 py-2 text-[10px] font-semibold uppercase tracking-widest text-gray-400">Viewing as</p>

          <button (click)="switchPersona('ian')"
            class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors text-left">
            <div class="w-7 h-7 bg-gradient-to-br from-teal-400 to-cyan-600 rounded-full flex items-center justify-center text-white text-xs font-semibold shrink-0">I</div>
            <div class="flex-1 min-w-0">
              <p class="font-medium text-gray-900 text-sm">Ian</p>
              <p class="text-[11px] text-gray-400">Site Administrator</p>
            </div>
            @if (personaService.activePersona() === 'ian') {
              <svg class="w-4 h-4 text-blue-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
              </svg>
            }
          </button>

          <button (click)="switchPersona('maya')"
            class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors text-left">
            <div class="w-7 h-7 bg-gradient-to-br from-violet-400 to-purple-600 rounded-full flex items-center justify-center text-white text-xs font-semibold shrink-0">M</div>
            <div class="flex-1 min-w-0">
              <p class="font-medium text-gray-900 text-sm">Maya</p>
              <p class="text-[11px] text-gray-400">Network User</p>
            </div>
            @if (personaService.activePersona() === 'maya') {
              <svg class="w-4 h-4 text-blue-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
              </svg>
            }
          </button>
          @if (personaService.activePersona() === 'maya') {
            <div class="border-t border-gray-100 mt-1 pt-1">
              <button (click)="personaService.showSettings.set(true); userMenuOpen = false"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors text-left">
                <div class="w-7 h-7 bg-gray-100 rounded flex items-center justify-center shrink-0">
                  <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </div>
                <span class="font-medium">Settings</span>
              </button>
            </div>
          }
        </div>
      }
    </div>
  </div>
</header>
